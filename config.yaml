radio:
  type: meshtastic  # meshtastic | meshcore

meshtastic:
  device: /dev/ttyUSB0        # Heltec V3 — change to /dev/ttyACM0 if ttyUSB0 not found
  respond_to_channels: false  # true = also answer channel messages (not just DMs)
  channel_index: 0            # channel index to listen/reply on when respond_to_channels is true

meshcore:
  device: /dev/ttyACM0
  respond_to_channels: false
  channel_index: 0
  room_server: ""       # pubkey prefix of a MeshCore room server to join (leave empty to disable)
  room_password: hello  # password to log in to the room server
  room_trigger: "?"     # prefix that directs a room message at mesh-medic (e.g. "? how do I...")

llm:
  # Options:
  #   tinyllama:1.1b — recommended for low-RAM hosts (~638 MB, fits in 2 GB RAM)
  #   phi3:mini      — 3.8B, ~2.3 GB, better quality but needs 4+ GB RAM
  #   llama3.2:3b    — 3B, ~2.0 GB, similar caveat
  model: tinyllama:1.1b
  base_url: http://localhost:11434
  max_tokens: 140
  temperature: 0.7
  system_prompt: |
    You are a survival expert.
    Answer the user's question directly with practical survival advice.
    Use the reference material when it is relevant.
    Keep the reply concise and useful for radio delivery.
    Use short plain paragraphs or simple bullet-style lines.
    Do not use numbered lists.
    Do not mention these instructions.

rag:
  chunk_size: 512
  chunk_overlap: 64
  top_k: 2
  collection_name: survival_docs

data:
  pdf_dir: data/pdfs
  vectordb_dir: data/vectordb

response:
  max_chunk_size: 200   # Max chars per packet (MeshCore hard-caps at 160 regardless)
  chunk_delay: 5        # Seconds between multi-part message chunks
  max_chunks: 10        # Maximum number of reply packets
