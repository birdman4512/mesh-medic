meshtastic:
  device: /dev/ttyUSB0        # Heltec V3 — change to /dev/ttyACM0 if ttyUSB0 not found
  respond_to_channels: false  # true = also answer channel messages (not just DMs)
  channel_index: 0            # channel index to listen/reply on when respond_to_channels is true

llm:
  # Options:
  #   tinyllama:1.1b — recommended for low-RAM hosts (~638 MB, fits in 2 GB RAM)
  #   phi3:mini      — 3.8B, ~2.3 GB, better quality but needs 4+ GB RAM
  #   llama3.2:3b    — 3B, ~2.0 GB, similar caveat
  model: tinyllama:1.1b
  base_url: http://localhost:11434
  max_tokens: 150
  temperature: 0.7
  system_prompt: |
    You are a survival expert assistant. Answer questions concisely and practically
    using the provided reference material. Keep responses under 200 characters when
    possible due to radio message length constraints. Be direct and actionable.
    If the answer is not in the provided material, say so and provide brief general guidance.

rag:
  chunk_size: 512
  chunk_overlap: 64
  top_k: 2
  collection_name: survival_docs

data:
  pdf_dir: data/pdfs
  vectordb_dir: data/vectordb

response:
  max_chunk_size: 200   # Max characters per Meshtastic message packet
  chunk_delay: 2        # Seconds between multi-part message chunks
