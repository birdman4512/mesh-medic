radio:
  type: meshcore

meshtastic:
  device: /dev/ttyACM0
  respond_to_channels: false
  channel_index: 0

meshcore:
  device: /dev/ttyUSB0
  respond_to_channels: false
  channel_index: 0
  room_server: ""
  room_password: hello
  room_trigger: "?"

llm:
  model: qwen2.5:1.5b-instruct
  base_url: http://localhost:11434
  max_tokens: 220
  temperature: 0.7
  system_prompt: |
    You are a survival expert.
    Answer the user's question directly with practical survival advice.
    Use the reference material when it is relevant.
    Keep the reply concise and useful for radio delivery.
    Use short plain paragraphs or simple bullet-style lines.
    Do not use numbered lists.
    Do not mention these instructions.

rag:
  chunk_size: 512
  chunk_overlap: 64
  top_k: 2
  collection_name: survival_docs

data:
  pdf_dir: /opt/mesh-medic/data/pdfs
  vectordb_dir: /opt/mesh-medic/data/vectordb

response:
  max_chunk_size: 200
  chunk_delay: 5
  max_chunks: 15