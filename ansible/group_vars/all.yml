# Application install location
mesh_medic_install_dir: /opt/mesh-medic
mesh_medic_user: mesh-medic
mesh_medic_data_dir: /opt/mesh-medic/data

# Git repo — update this to your actual repo URL before deploying
# SSH (recommended):  git@github.com:birdman4512/mesh-medic.git
# HTTPS (public repo): https://github.com/birdman4512/mesh-medic.git
mesh_medic_repo_url: https://github.com/birdman4512/mesh-medic.git
mesh_medic_version: main

# LLM model
# Options:
#   tinyllama:1.1b — recommended for low-RAM VMs (~638 MB, 1.1B params, fits in 2 GB RAM)
#   phi3:mini      — 3.8B params, ~2.3 GB — requires 4+ GB RAM, slow on CPU-only
#   llama3.2:3b    — 3B params, ~2.0 GB — requires 4+ GB RAM, slow on CPU-only
ollama_version: "0.21.0"
ollama_model: tinyllama:1.1b
ollama_pull_both_models: false  # set true to also pull phi3:mini as a backup

# Radio backend — set radio_type to "meshcore" to use MeshCore instead of Meshtastic
radio_type: meshcore
meshtastic_device: /dev/ttyACM0
meshcore_device: /dev/ttyUSB0

# MeshCore device identity & radio parameters
# Regions / frequencies:  AU915 = 915.0,  US915 = 915.0,  EU868 = 868.0,  EU433 = 433.175
# BW 250 / SF 10 / CR 5 are the MeshCore community defaults
meshcore_node_name: "Mesh Medic"
meshcore_freq: 923.125  # MHz
meshcore_bw: 62.5       # kHz
meshcore_sf: 8
meshcore_cr: 6
# meshcore_repeat not needed — repeater role is set by flashing Repeater firmware

# MeshCore room server (optional — leave meshcore_room_server empty to disable)
# Set meshcore_room_server to the pubkey prefix of the room server node
# Anyone in the room can then ask a question by prefixing it with meshcore_room_trigger
meshcore_room_server: ""
meshcore_room_password: hello
meshcore_room_trigger: "?"

# LLM parameters
llm_max_tokens: 140    # Allows fuller multi-packet replies on MeshCore
llm_temperature: 0.7

# RAG parameters
rag_chunk_size: 512
rag_top_k: 2  # 2 chunks × 512 chars = ~1024 chars context; less memory pressure

# Response chunking
response_max_chunk_size: 200
response_chunk_delay: 5   # seconds between chunks
response_max_chunks: 10   # maximum number of reply packets
