---
- name: Create mesh-medic system user
  ansible.builtin.user:
    name: "{{ mesh_medic_user }}"
    system: true
    shell: /usr/sbin/nologin
    groups: dialout
    append: true
    create_home: false

- name: Ensure root .ssh directory exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    mode: "0700"

- name: Fetch GitHub host keys
  ansible.builtin.command:
    cmd: ssh-keyscan -H -t rsa,ecdsa,ed25519 github.com
  register: github_host_keys
  changed_when: false
  when: mesh_medic_repo_url is match('git@.*')

- name: Add GitHub host keys to root known_hosts
  ansible.builtin.blockinfile:
    path: /root/.ssh/known_hosts
    block: "{{ github_host_keys.stdout }}"
    create: true
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED - GitHub host keys"
  when: mesh_medic_repo_url is match('git@.*')

- name: Mark install directory as safe for git
  ansible.builtin.command:
    cmd: git config --global --add safe.directory {{ mesh_medic_install_dir }}
  changed_when: false

- name: Clone or update mesh-medic repository
  ansible.builtin.git:
    repo: "{{ mesh_medic_repo_url }}"
    dest: "{{ mesh_medic_install_dir }}"
    version: "{{ mesh_medic_version }}"
    force: true
  notify: Restart mesh-medic service

- name: Create data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ mesh_medic_user }}"
    group: "{{ mesh_medic_user }}"
    mode: "0755"
  loop:
    - "{{ mesh_medic_data_dir }}"
    - "{{ mesh_medic_data_dir }}/pdfs"
    - "{{ mesh_medic_data_dir }}/vectordb"
    - "{{ mesh_medic_data_dir }}/models"

- name: Set ownership of install directory to mesh-medic user
  ansible.builtin.file:
    path: "{{ mesh_medic_install_dir }}"
    owner: "{{ mesh_medic_user }}"
    group: "{{ mesh_medic_user }}"
    recurse: true

- name: Install CPU-only PyTorch (avoids pulling large CUDA build on x86_64)
  ansible.builtin.pip:
    name: torch
    extra_args: "--index-url https://download.pytorch.org/whl/cpu"
    virtualenv: "{{ mesh_medic_install_dir }}/venv"
    virtualenv_command: python3 -m venv
  become: true
  become_user: "{{ mesh_medic_user }}"
  when: ansible_architecture == "x86_64"

- name: Create Python virtualenv and install dependencies
  ansible.builtin.pip:
    requirements: "{{ mesh_medic_install_dir }}/requirements.txt"
    virtualenv: "{{ mesh_medic_install_dir }}/venv"
    virtualenv_command: python3 -m venv
  become: true
  become_user: "{{ mesh_medic_user }}"
  notify: Restart mesh-medic service

- name: Pre-download sentence-transformers embedding model
  ansible.builtin.command: >
    {{ mesh_medic_install_dir }}/venv/bin/python -c
    "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
  become: true
  become_user: "{{ mesh_medic_user }}"
  environment:
    HF_HOME: "{{ mesh_medic_data_dir }}/models"
  changed_when: false

- name: Deploy config file
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ mesh_medic_install_dir }}/config.yaml"
    owner: "{{ mesh_medic_user }}"
    group: "{{ mesh_medic_user }}"
    mode: "0640"
  notify: Restart mesh-medic service

- name: Mark config.yaml as assume-unchanged so git pull never conflicts with it
  ansible.builtin.command:
    cmd: git -C {{ mesh_medic_install_dir }} update-index --assume-unchanged config.yaml
  changed_when: false

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: mesh-medic.service.j2
    dest: /etc/systemd/system/mesh-medic.service
    mode: "0644"
  notify:
    - Reload systemd daemon
    - Restart mesh-medic service

- name: Enable and start mesh-medic service
  ansible.builtin.systemd:
    name: mesh-medic
    enabled: true
    state: started
