---
- name: Check if Ollama is already installed
  ansible.builtin.command: which ollama
  register: ollama_check
  ignore_errors: true
  changed_when: false

- name: Download Ollama install script
  ansible.builtin.get_url:
    url: https://ollama.ai/install.sh
    dest: /tmp/ollama-install.sh
    mode: "0755"
  when: ollama_check.rc != 0

- name: Install Ollama
  ansible.builtin.shell:
    cmd: /tmp/ollama-install.sh
    executable: /bin/bash
  when: ollama_check.rc != 0
  changed_when: true

- name: Remove Ollama install script
  ansible.builtin.file:
    path: /tmp/ollama-install.sh
    state: absent
  when: ollama_check.rc != 0

- name: Enable and start Ollama service
  ansible.builtin.systemd:
    name: ollama
    enabled: true
    state: started

- name: Wait for Ollama API to become ready
  ansible.builtin.uri:
    url: http://localhost:11434/api/tags
    method: GET
  register: ollama_ready
  until: ollama_ready.status == 200
  retries: 12
  delay: 5

- name: Pull primary model ({{ ollama_model }})
  ansible.builtin.command: ollama pull {{ ollama_model }}
  changed_when: false

- name: Pull phi3:mini as backup model
  ansible.builtin.command: ollama pull phi3:mini
  changed_when: false
  when: ollama_pull_both_models | bool and ollama_model != 'phi3:mini'
