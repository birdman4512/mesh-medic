---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install system dependencies
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-full
      - python3-dev
      - git
      - curl
      - build-essential
      - libusb-1.0-0-dev
      - usbutils
      - acl
      - zstd
    state: present

- name: Add deploy user to dialout group for USB serial access
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: dialout
    append: true
