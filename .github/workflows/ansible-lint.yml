name: Ansible Lint

on:
  push:
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-lint.yml"
  pull_request:
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-lint.yml"

jobs:
  lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Lint playbook
        run: ansible-lint ansible/playbook.yml
